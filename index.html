<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>유리병 편지 🌊</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --peach: #FFD6BA; --blush: #FFAEB0; --mint: #B5EAD7; --lavender: #C9C3E8;
      --sky: #BEE3F8; --cream: #FFF8F0; --sand: #F5E6D3; --ink: #5C4A3A;
      --ink-light:#9A8070; --water1: #A8D8EA; --water2: #7EC8C8; --water3: #5BA4CF;
      --shadow: rgba(92,74,58,.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Jua', sans-serif; background: var(--cream); color: var(--ink); overflow: hidden; height: 100vh; }
    .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .6s ease, transform .6s ease; transform: translateY(20px); }
    .screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .petal { position: absolute; opacity: .4; animation: petalFall linear infinite; }
    @keyframes petalFall { 0% { transform: translateY(-60px) rotate(0deg); opacity:.5; } 100% { transform: translateY(110vh) rotate(360deg); opacity:0; } }
    #cover { background: linear-gradient(160deg, #FFE8D6 0%, #FFF0F5 40%, #E8F4FF 100%); z-index: 1; }
    .cover-art { position: relative; margin-bottom: 2rem; animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
    .bottle-svg { width: 120px; filter: drop-shadow(0 8px 20px rgba(0,0,0,.1)); }
    .cover-title { font-size: clamp(2.8rem,7vw,4.2rem); text-align: center; margin-bottom: .6rem; }
    .cover-sub { font-size: 1.2rem; color: var(--ink-light); text-align: center; margin-bottom: 2.8rem; line-height: 2; }
    .btn-primary { font-family: 'Jua', sans-serif; font-size: 1.25rem; padding: .9rem 2.8rem; border: none; border-radius: 50px; cursor: pointer; background: linear-gradient(135deg, var(--blush), var(--peach)); color: var(--ink); box-shadow: 0 4px 20px rgba(255,174,176,.5); transition: transform .2s; }
    .btn-secondary { margin-top: 1rem; font-family: 'Jua', sans-serif; font-size: 1rem; color: var(--ink-light); background: none; border: none; cursor: pointer; text-decoration: underline dotted; }
    .wave-deco { position: absolute; bottom: 0; left:0; right:0; height: 80px; overflow: hidden; }
    #write { background: linear-gradient(180deg, #FFF5ED 0%, #FFF0F8 100%); z-index: 1; padding: 1.5rem; }
    .paper-wrap { position: relative; width: min(500px, 92vw); }
    .paper { background: #FFFDF7; border-radius: 4px 12px 12px 4px; padding: 2rem 2rem 2rem 3.5rem; box-shadow: 4px 4px 0 #EDD9C8, 6px 6px 0 #E2CAAC, 0 20px 60px var(--shadow); position: relative; }
    .paper::after { content:''; position:absolute; top:0; left:3rem; bottom:0; width:1px; background:rgba(255,160,160,.3); pointer-events:none; }
    .input-name { font-family: 'Jua', sans-serif; font-size: 1.25rem; width: 100%; border: none; border-bottom: 1.5px dashed #D4B8A0; background: transparent; padding: .2rem .1rem .4rem; outline: none; margin-bottom: 1.2rem; }
    .textarea-letter { font-family: 'Jua', sans-serif; font-size: 1.15rem; width: 100%; min-height: 160px; border: none; background: transparent; resize: none; outline: none; line-height: 2.1; }
    .btn-send { font-family: 'Jua', sans-serif; font-size: 1.2rem; padding: .8rem 2.4rem; border: none; border-radius: 50px; cursor: pointer; background: linear-gradient(135deg, var(--mint), var(--sky)); color: var(--ink); box-shadow: 0 4px 16px rgba(181,234,215,.6); transition: transform .2s; }
    #drift { background: linear-gradient(180deg, #C9EEFF 0%, #E0F7FA 35%, #B2EBF2 60%, #7EC8C8 100%); z-index: 1; overflow: hidden; }
    .drift-water { position:absolute; bottom:0; left:0; right:0; height:55%; overflow:hidden; }
    .drift-wave { position:absolute; left:-50%; width:200%; animation: waveMove linear infinite; }
    @keyframes waveMove { 0%{transform:translateX(0);} 100%{transform:translateX(50%);} }
    #driftBottle { position:absolute; width:90px; bottom:32%; left:50%; transform:translateX(-50%); filter: drop-shadow(0 4px 12px rgba(0,80,120,.2)); }
    .bottle-animating { animation: bottleDrift 3.5s ease-in forwards, bottleRock 1.2s ease-in-out infinite !important; }
    @keyframes bottleDrift { 0% { left:50%; bottom:32%; opacity:1; } 100% { left:105%; bottom:25%; opacity:0; } }
    @keyframes bottleRock { 0%,100%{ transform:translateX(-50%) rotate(-5deg); } 50% { transform:translateX(-50%) rotate(5deg); } }
    #gallery { background: linear-gradient(160deg, #F5EFFF 0%, #FFF0F5 50%, #ECFBF5 100%); z-index:1; padding:1.5rem 1rem; overflow-y:auto; align-items:flex-start; justify-content:flex-start; }
    .letters-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1rem; width:100%; max-width:900px; margin:0 auto; padding-bottom:5rem; }
    .letter-card { background:#FFFDF7; border-radius:8px; padding:1.4rem; box-shadow:3px 3px 0 #EDD9C8,0 8px 30px var(--shadow); position:relative; cursor:pointer; transition:transform .25s; }
    .letter-card:hover{ transform:translateY(-4px) rotate(.5deg); }
    .card-ribbon { position:absolute; top:-6px; right:16px; width:18px; height:28px; border-radius:0 0 50% 50%; }
    .ribbon-pink{background:var(--blush);} .ribbon-mint{background:var(--mint);} .ribbon-lav{background:var(--lavender);} .ribbon-sky{background:var(--sky);} .ribbon-peach{background:var(--peach);}
  </style>
</head>
<body>

<div id="particles"></div>

<div class="screen active" id="cover">
  <div class="cover-art">
    <svg class="bottle-svg" viewBox="0 0 120 200" fill="none">
      <rect x="44" y="12" width="32" height="18" rx="4" fill="#D4A96A"/><rect x="48" y="8" width="24" height="10" rx="3" fill="#C8955A"/>
      <path d="M36 30 Q30 50 28 80 L28 160 Q28 180 60 180 Q92 180 92 160 L92 80 Q90 50 84 30 Z" fill="#B8E0F0" fill-opacity=".7"/>
      <path d="M29 110 Q29 80 60 76 Q91 80 91 110 L91 160 Q91 180 60 180 Q29 180 29 160 Z" fill="#7EC8C8" fill-opacity=".5"/>
      <path d="M36 30 Q30 50 28 80 L28 160 Q28 180 60 180 Q92 180 92 160 L92 80 Q90 50 84 30 Z" stroke="#8BBDD4" stroke-width="2" fill="none"/>
    </svg>
  </div>
  <h1 class="cover-title">유리병 편지 🌊</h1>
  <p class="cover-sub">마음을 담아 편지를 써보세요!</p>
  <button class="btn-primary" onclick="goTo('write')">✉️ 편지 쓰기</button>
  <button class="btn-secondary" onclick="goTo('gallery')">🌸 모든 편지 보기</button>
</div>

<div class="screen" id="write">
  <h2>✉️ 편지 쓰기</h2>
  <div class="paper-wrap">
    <div class="paper">
      <input class="input-name" id="senderName" type="text" maxlength="20" placeholder="보내는 사람 (선택)"/>
      <textarea class="textarea-letter" id="letterContent" maxlength="500" placeholder="이 편지는 둔산사옥에서 시작되어..."></textarea>
    </div>
  </div>
  <div style="margin-top: 20px;">
    <button class="btn-secondary" onclick="goTo('cover')">← 뒤로</button>
    <button class="btn-send" onclick="sendLetter()">🌊 흘려보내기</button>
  </div>
</div>

<div class="screen" id="drift">
  <div class="drift-water">
    <svg class="drift-wave" viewBox="0 0 1440 80" preserveAspectRatio="none"><path d="M0,30 C360,70 720,10 1080,50 C1260,70 1380,30 1440,40 L1440,80 L0,80Z" fill="#A8D8EA" fill-opacity=".6"/></svg>
  </div>
  <svg id="driftBottle" viewBox="0 0 120 200" fill="none">
    <path d="M36 30 Q30 50 28 80 L28 160 Q28 180 60 180 Q92 180 92 160 L92 80 Q90 50 84 30 Z" fill="#B8E0F0" fill-opacity=".7"/>
  </svg>
  <h2 style="color: white; z-index: 2;">편지가 떠나갔어요 🌊</h2>
  <button class="btn-primary" onclick="goTo('gallery')" style="margin-top: 20px;">🌸 모든 편지 보기</button>
</div>

<div class="screen" id="gallery">
  <div style="text-align: center; width: 100%; margin-bottom: 20px;">
    <button class="btn-secondary" onclick="goTo('cover')">← 처음으로</button>
    <h2>🌸 편지 모아보기</h2>
  </div>
  <div class="letters-grid" id="lettersGrid"></div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const $ = id => document.getElementById(id);

  // --- Supabase 설정 (현재 키가 올바르지 않아 오류가 날 수 있습니다) ---
  const SUPABASE_URL = 'https://zaqzaxnfsxhqedzungeg.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_dLT3EuDRIudAoRW7f7sNhQ_LKv2981k';
  
  let supabase = null;
  try {
    supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  } catch (e) {
    console.error("Supabase 초기화 실패:", e);
  }

  // 꽃잎 효과
  (function(){
    const colors=['#FFD6BA','#FFAEB0','#B5EAD7','#C9C3E8','#BEE3F8'];
    const wrap=$('particles');
    if(!wrap) return;
    for(let i=0;i<15;i++){
      const p=document.createElement('div'); p.className='petal';
      const s=10+Math.random()*10;
      p.style.cssText=`width:${s}px;height:${s}px;background:${colors[i%5]};left:${Math.random()*100}%;animation-duration:${10+Math.random()*10}s;border-radius:50%;`;
      wrap.appendChild(p);
    }
  })();

  // 화면 이동 함수 (전역 등록)
  window.goTo = function(id) {
    console.log("Moving to:", id);
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = $(id);
    if (target) {
      target.classList.add('active');
      if(id === 'gallery') loadLetters();
    }
  };

  // 편지 보내기
  window.sendLetter = async function() {
    const sender = $('senderName').value.trim() || '익명의 여행자';
    const content = $('letterContent').value.trim();
    if(!content) return alert('편지 내용을 적어주세요 💌');

    try {
      if (!supabase) throw new Error("데이터베이스 연결 설정이 없습니다.");
      
      const { error } = await supabase.from('letters').insert([{ sender, content }]);
      if (error) throw error;

      console.log("편지 전송 성공 (DB)");
    } catch (e) {
      console.warn("DB 저장 실패, 브라우저에 임시 저장합니다:", e.message);
      saveToLocal(sender, content);
    }

    // 애니메이션 및 화면 전환은 저장 결과와 상관없이 진행
    $('driftBottle').classList.add('bottle-animating');
    setTimeout(() => {
        goTo('drift');
        // 애니메이션 초기화 (나중에 다시 쓸 수 있게)
        setTimeout(() => $('driftBottle').classList.remove('bottle-animating'), 3500);
    }, 100);
  };

  // 편지 불러오기
  async function loadLetters() {
    const grid = $('lettersGrid');
    grid.innerHTML = '<div style="text-align:center; width:100%;">파도에서 건져올리는 중...</div>';

    let letters = [];
    try {
      if (!supabase) throw new Error("연결 설정 없음");
      const { data, error } = await supabase.from('letters').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      letters = data || [];
    } catch (e) {
      console.warn("DB 불러오기 실패, 로컬 데이터를 가져옵니다:", e.message);
      letters = getFromLocal();
    }

    if (letters.length === 0) {
      grid.innerHTML = '<div style="text-align:center; width:100%; padding: 2rem;">아직 도착한 편지가 없어요. 🌊<br><br>첫 번째 편지를 보내보세요!</div>';
      return;
    }

    grid.innerHTML = '';
    const ribbons = ['ribbon-pink', 'ribbon-mint', 'ribbon-lav', 'ribbon-sky', 'ribbon-peach'];
    letters.forEach((l, i) => {
      const card = document.createElement('div');
      card.className = 'letter-card';
      card.innerHTML = `
        <div class="card-ribbon ${ribbons[i % 5]}"></div>
        <div style="font-size: 0.9rem; color: #9A8070; margin-bottom: 10px;">✉️ ${l.sender} 로부터</div>
        <div style="line-height: 1.6; word-break: break-all;">${l.content}</div>
      `;
      grid.appendChild(card);
    });
  }

  // 로컬 스토리지 보조 함수
  function saveToLocal(sender, content) {
    const localData = JSON.parse(localStorage.getItem('my_letters') || '[]');
    localData.unshift({ 
      sender, 
      content, 
      created_at: new Date().toISOString() 
    });
    localStorage.setItem('my_letters', JSON.stringify(localData.slice(0, 50))); // 최대 50개 유지
  }
  function getFromLocal() {
    return JSON.parse(localStorage.getItem('my_letters') || '[]');
  }
</script>
</body>
</html>
